<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slacker{% if workspace %} — {{ workspace.name }}{% endif %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sidebar-bg: #19171d;
      --sidebar-text: #c9b6d4;
      --sidebar-active: #36213e;
      --sidebar-hover: #27212d;
      --sidebar-accent: #ffffff;
      --main-bg: #222529;
      --main-text: #d1d2d3;
      --header-border: #404247;
      --msg-hover: #2a2d31;
      --mention-bg: #1d3a5f;
      --mention-text: #5db8f5;
      --link-color: #5db8f5;
      --muted: #848d95;
      --code-bg: #2b2d30;
      --thread-border: #404247;
      --search-bg: #372a3e;
      --parent-bg: #1e2124;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--main-bg);
      color: var(--main-text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      font-size: 15px;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 260px;
      min-width: 260px;
      background: var(--sidebar-bg);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    #workspace-header {
      padding: 14px 16px 10px;
      border-bottom: 1px solid #372a3e;
      flex-shrink: 0;
    }

    #workspace-name {
      font-size: 17px;
      font-weight: 700;
      color: var(--sidebar-accent);
    }

    #search-wrap {
      padding: 8px 12px;
      flex-shrink: 0;
    }

    #search-box {
      width: 100%;
      padding: 6px 10px;
      background: var(--search-bg);
      border: 1px solid transparent;
      border-radius: 6px;
      color: var(--sidebar-text);
      font-size: 14px;
      outline: none;
    }
    #search-box:focus { border-color: #7c5cbf; }
    #search-box::placeholder { color: #9b8fa5; }

    .section-label {
      padding: 10px 16px 4px;
      font-size: 11px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    #channel-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 20px;
    }
    #channel-list::-webkit-scrollbar { width: 4px; }
    #channel-list::-webkit-scrollbar-thumb { background: #4a3a56; border-radius: 2px; }

    .channel-item {
      display: flex;
      align-items: center;
      padding: 4px 16px;
      cursor: pointer;
      color: var(--sidebar-text);
      font-size: 14px;
      border-radius: 4px;
      margin: 0 4px;
      gap: 7px;
      white-space: nowrap;
      overflow: hidden;
    }
    .channel-item:hover { background: var(--sidebar-hover); color: var(--sidebar-accent); }
    .channel-item.active { background: var(--sidebar-active); color: var(--sidebar-accent); font-weight: 600; }
    .channel-item.archived { opacity: 0.45; }
    .ch-icon { font-size: 15px; flex-shrink: 0; color: var(--muted); }
    .channel-item.active .ch-icon, .channel-item:hover .ch-icon { color: inherit; }
    .ch-name { overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .ch-count { font-size: 11px; color: var(--muted); flex-shrink: 0; }

    /* ── Main ── */
    #main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      height: 100vh;
    }

    #channel-header {
      padding: 12px 20px;
      border-bottom: 1px solid var(--header-border);
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    #channel-title { font-size: 16px; font-weight: 700; color: var(--sidebar-accent); }
    #channel-meta { font-size: 13px; color: var(--muted); margin-top: 1px; }

    /* ── Message area ── */
    #message-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px 10px;
      display: flex;
      flex-direction: column;
    }
    #message-area::-webkit-scrollbar { width: 6px; }
    #message-area::-webkit-scrollbar-thumb { background: #404247; border-radius: 3px; }

    #load-more {
      align-self: center;
      margin-bottom: 16px;
      padding: 5px 16px;
      background: transparent;
      border: 1px solid var(--thread-border);
      border-radius: 4px;
      color: var(--muted);
      cursor: pointer;
      font-size: 13px;
      display: none;
    }
    #load-more:hover { background: var(--msg-hover); color: var(--main-text); }

    .date-divider {
      text-align: center;
      margin: 16px 0 8px;
      font-size: 12px;
      color: var(--muted);
      position: relative;
      flex-shrink: 0;
    }
    .date-divider::before, .date-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: var(--thread-border);
    }
    .date-divider::before { left: 0; }
    .date-divider::after { right: 0; }

    .message {
      display: flex;
      gap: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      margin-bottom: 1px;
      flex-shrink: 0;
    }
    .message:hover { background: var(--msg-hover); }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: #fff;
      margin-top: 2px;
      cursor: pointer;
    }
    .avatar:hover { opacity: 0.85; }

    .msg-body { flex: 1; min-width: 0; }
    .msg-meta { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
    .msg-user {
      font-weight: 700;
      font-size: 14px;
      color: var(--sidebar-accent);
      cursor: pointer;
    }
    .msg-user:hover { text-decoration: underline; }
    .msg-time { font-size: 12px; color: var(--muted); }

    .msg-text {
      line-height: 1.5;
      word-break: break-word;
      color: var(--main-text);
    }
    .msg-text a { color: var(--link-color); text-decoration: none; }
    .msg-text a:hover { text-decoration: underline; }
    .msg-text .mention {
      color: var(--mention-text);
      background: var(--mention-bg);
      border-radius: 3px;
      padding: 0 3px;
      font-size: 0.93em;
    }
    .msg-text .mention:hover { opacity: 0.85; }
    .msg-text code { background: var(--code-bg); border-radius: 3px; padding: 1px 4px; font-size: 13px; font-family: monospace; }
    .msg-text pre { background: var(--code-bg); border-radius: 4px; padding: 10px 12px; margin: 6px 0; overflow-x: auto; font-size: 13px; font-family: monospace; white-space: pre-wrap; }

    .thread-btn {
      margin-top: 4px;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: var(--link-color);
      cursor: pointer;
      padding: 2px 0;
    }
    .thread-btn:hover { text-decoration: underline; }

    .reactions { margin-top: 4px; display: flex; flex-wrap: wrap; gap: 4px; }
    .reaction {
      background: var(--code-bg);
      border: 1px solid var(--thread-border);
      border-radius: 12px;
      padding: 1px 7px;
      font-size: 12px;
      color: var(--muted);
    }

    .file-attachments { margin-top: 6px; display: flex; flex-direction: column; gap: 6px; }

    .file-image {
      max-width: 360px;
      max-height: 280px;
      border-radius: 6px;
      border: 1px solid var(--thread-border);
      cursor: pointer;
      display: block;
    }
    .file-image:hover { opacity: 0.9; }

    .file-card {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--code-bg);
      border: 1px solid var(--thread-border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      max-width: 320px;
    }
    .file-card a { color: var(--link-color); text-decoration: none; }
    .file-card a:hover { text-decoration: underline; }
    .file-icon { font-size: 20px; flex-shrink: 0; }
    .file-meta { display: flex; flex-direction: column; }
    .file-size { font-size: 11px; color: var(--muted); }
    .file-not-downloaded { font-size: 11px; color: var(--muted); font-style: italic; }

    /* ── Thread panel ── */
    #thread-panel {
      width: 380px;
      min-width: 380px;
      border-left: 1px solid var(--header-border);
      display: none;
      flex-direction: column;
      height: 100vh;
      background: var(--main-bg);
    }
    #thread-panel.open { display: flex; }

    #thread-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--header-border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    #thread-header span { font-weight: 700; font-size: 15px; }
    #thread-close { cursor: pointer; color: var(--muted); font-size: 18px; line-height: 1; padding: 4px; }
    #thread-close:hover { color: var(--main-text); }

    #thread-messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 14px;
    }
    #thread-messages::-webkit-scrollbar { width: 4px; }
    #thread-messages::-webkit-scrollbar-thumb { background: #404247; }

    .thread-parent {
      background: var(--parent-bg);
      border-radius: 6px;
      padding: 4px 8px;
      margin-bottom: 4px;
    }

    .thread-divider {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 12px 0 8px;
      font-size: 12px;
      color: var(--muted);
    }
    .thread-divider::before, .thread-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--thread-border);
    }

    /* ── Search / user results ── */
    #search-results {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      display: none;
    }
    #search-results.open { display: block; }

    .results-header {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .results-clear {
      font-size: 12px;
      color: var(--link-color);
      cursor: pointer;
    }
    .results-clear:hover { text-decoration: underline; }

    .search-result {
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 6px;
      background: var(--msg-hover);
      cursor: pointer;
      border: 1px solid transparent;
    }
    .search-result:hover { border-color: #7c5cbf; }

    .search-result-meta {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .search-ch {
      color: var(--mention-text);
      cursor: pointer;
      font-weight: 600;
    }
    .search-ch:hover { text-decoration: underline; }
    .search-user { cursor: pointer; }
    .search-user:hover { color: var(--sidebar-accent); }

    /* ── Empty / loading ── */
    #empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      gap: 8px;
    }
    #empty-state .big { font-size: 48px; }

    #loading {
      flex: 1;
      display: none;
      align-items: center;
      justify-content: center;
      color: var(--muted);
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div id="workspace-header">
    <div id="workspace-name">{{ workspace.name if workspace else 'Slacker' }}</div>
  </div>
  <div id="search-wrap">
    <input id="search-box" type="text" placeholder="Search messages or people…" autocomplete="off">
  </div>
  <div id="channel-list">
    <div class="section-label">Channels</div>
    <div id="channel-items"></div>
    <div class="section-label" id="dms-label" style="display:none">Direct Messages</div>
    <div id="dm-items"></div>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="channel-header">
    <div>
      <div id="channel-title">Select a channel</div>
      <div id="channel-meta"></div>
    </div>
  </div>

  <div id="loading">Loading…</div>

  <div id="empty-state">
    <div class="big">💬</div>
    <div>Select a channel or DM to start reading</div>
  </div>

  <div id="message-area" style="display:none">
    <button id="load-more">Load older messages</button>
    <div id="messages"></div>
  </div>

  <div id="search-results"></div>
</div>

<!-- Thread panel -->
<div id="thread-panel">
  <div id="thread-header">
    <span>Thread</span>
    <span id="thread-close">✕</span>
  </div>
  <div id="thread-messages"></div>
</div>

<script>
// ── State ──
let currentChannel = null;
let currentChannelName = '';
let currentChannelType = '';
let oldestTs = null;
let hasMore = false;
let searchTimeout = null;
let allChannels = [];  // [{id, name, type, ...}]

// ── Avatar colors ──
const COLORS = ['#e01e5a','#ecb22e','#2eb886','#36c5f0','#e8912d','#7c5cbf','#6cd4b7','#d94040'];
function avatarColor(name) {
  let h = 0;
  for (const c of (name || '?')) h = (h * 31 + c.charCodeAt(0)) & 0xffffffff;
  return COLORS[Math.abs(h) % COLORS.length];
}
function initials(name) {
  if (!name) return '?';
  const parts = name.trim().split(/\s+/);
  return (parts.length >= 2
    ? parts[0][0] + parts[parts.length - 1][0]
    : name.slice(0, 2)).toUpperCase();
}

// ── Load channels ──
async function loadChannels() {
  const res = await fetch('/api/channels');
  allChannels = await res.json();

  const chEl = document.getElementById('channel-items');
  const dmEl = document.getElementById('dm-items');
  const dmLabel = document.getElementById('dms-label');

  const regular = allChannels.filter(c => c.type === 'channel' || c.type === 'group');
  const dms = allChannels.filter(c => c.type === 'im' || c.type === 'mpim');

  chEl.innerHTML = regular.map(channelItem).join('');
  if (dms.length) {
    dmLabel.style.display = '';
    dmEl.innerHTML = dms.map(channelItem).join('');
  }

  document.querySelectorAll('.channel-item').forEach(el => {
    el.addEventListener('click', () => selectChannel(el.dataset.id, el.dataset.name, el.dataset.type));
  });
}

function channelItem(c) {
  const icon = c.type === 'im' ? '◎' : c.type === 'mpim' ? '◉' : c.type === 'group' ? '🔒' : '#';
  const archived = c.is_archived ? ' archived' : '';
  return `<div class="channel-item${archived}" data-id="${c.id}" data-name="${escAttr(c.name)}" data-type="${c.type}">
    <span class="ch-icon">${icon}</span>
    <span class="ch-name">${esc(c.name)}</span>
    <span class="ch-count">${c.msg_count > 0 ? c.msg_count.toLocaleString() : ''}</span>
  </div>`;
}

// ── Select channel ──
async function selectChannel(id, name, type) {
  currentChannel = id;
  currentChannelName = name;
  currentChannelType = type;
  oldestTs = null;
  hasMore = false;

  document.querySelectorAll('.channel-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === id);
  });

  const icon = type === 'im' ? '@' : type === 'mpim' ? '◉' : type === 'group' ? '🔒' : '#';
  document.getElementById('channel-title').textContent = `${icon} ${name}`;
  document.getElementById('channel-meta').textContent = '';
  document.getElementById('search-box').value = '';

  showView('loading');
  closeThread();
  document.getElementById('messages').innerHTML = '';

  await fetchMessages(id, null);

  showView('messages');
  document.getElementById('load-more').style.display = hasMore ? 'block' : 'none';

  const area = document.getElementById('message-area');
  area.scrollTop = area.scrollHeight;
}

// ── Views ──
function showView(view) {
  document.getElementById('loading').style.display = view === 'loading' ? 'flex' : 'none';
  document.getElementById('empty-state').style.display = view === 'empty' ? 'flex' : 'none';
  document.getElementById('message-area').style.display = view === 'messages' ? 'flex' : 'none';
  document.getElementById('search-results').classList.toggle('open', view === 'search');
}

// ── Fetch messages ──
async function fetchMessages(chId, beforeTs) {
  const params = new URLSearchParams({ limit: 50 });
  if (beforeTs) params.set('before', beforeTs);

  const res = await fetch(`/api/channels/${chId}/messages?${params}`);
  const data = await res.json();

  hasMore = data.has_more;
  if (!data.messages.length) return;

  const msgs = document.getElementById('messages');
  const sorted = [...data.messages].reverse();
  let lastDate = null;

  sorted.forEach(msg => {
    const date = new Date(parseFloat(msg.ts) * 1000);
    const dateStr = date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

    if (dateStr !== lastDate) {
      const div = document.createElement('div');
      div.className = 'date-divider';
      div.textContent = dateStr;
      if (beforeTs) msgs.insertBefore(div, msgs.firstChild);
      else msgs.appendChild(div);
      lastDate = dateStr;
    }

    const el = renderMessage(msg);
    if (beforeTs) msgs.insertBefore(el, msgs.firstChild);
    else msgs.appendChild(el);
  });

  oldestTs = sorted[0]?.ts;
}

// ── Render file attachments ──
function renderFiles(files) {
  if (!files || !files.length) return '';
  return '<div class="file-attachments">' + files.map(f => {
    const sizeKb = f.size ? `${Math.round(f.size / 1024)}KB` : '';
    const isImage = f.mimetype && f.mimetype.startsWith('image/');

    if (!f.downloaded || !f.url) {
      return `<div class="file-card">
        <span class="file-icon">${isImage ? '🖼️' : '📄'}</span>
        <div class="file-meta">
          <span>${esc(f.title)}</span>
          <span class="file-not-downloaded">not downloaded — run download_files.py</span>
        </div>
      </div>`;
    }

    if (isImage) {
      return `<a href="${f.url}" target="_blank">
        <img class="file-image" src="${f.url}" alt="${esc(f.title)}" loading="lazy">
      </a>`;
    }

    const icon = fileIcon(f.mimetype);
    return `<div class="file-card">
      <span class="file-icon">${icon}</span>
      <div class="file-meta">
        <a href="${f.url}" target="_blank" download="${esc(f.name)}">${esc(f.title)}</a>
        ${sizeKb ? `<span class="file-size">${sizeKb}</span>` : ''}
      </div>
    </div>`;
  }).join('') + '</div>';
}

function fileIcon(mimetype) {
  if (!mimetype) return '📄';
  if (mimetype.startsWith('video/')) return '🎥';
  if (mimetype.startsWith('audio/')) return '🎵';
  if (mimetype.includes('pdf')) return '📕';
  if (mimetype.includes('zip') || mimetype.includes('compressed')) return '🗜️';
  if (mimetype.includes('spreadsheet') || mimetype.includes('excel')) return '📊';
  if (mimetype.includes('presentation') || mimetype.includes('powerpoint')) return '📊';
  if (mimetype.includes('word') || mimetype.includes('document')) return '📝';
  if (mimetype.includes('text') || mimetype.includes('json') || mimetype.includes('javascript')) return '📃';
  return '📄';
}

// ── Render message ──
function renderMessage(msg, compact = false) {
  const el = document.createElement('div');
  el.className = 'message';
  el.dataset.ts = msg.ts;

  const color = avatarColor(msg.user_name);
  const ini = initials(msg.user_name);

  const reactions = (msg.reactions || []).map(r =>
    `<span class="reaction">${r.name} ${r.count}</span>`
  ).join('');

  const thread = !compact && msg.reply_count > 0
    ? `<div class="thread-btn" data-ts="${msg.ts}">💬 ${msg.reply_count} ${msg.reply_count === 1 ? 'reply' : 'replies'}</div>`
    : '';

  el.innerHTML = `
    <div class="avatar" style="background:${color}" data-user-id="${msg.user_id || ''}" title="Show messages from ${esc(msg.user_name)}">${ini}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-user" data-user-id="${msg.user_id || ''}">${esc(msg.user_name)}</span>
        <span class="msg-time">${msg.ts_display}</span>
      </div>
      <div class="msg-text">${msg.text || '<em style="color:var(--muted)">[no text]</em>'}</div>
      ${renderFiles(msg.files)}
      ${reactions ? `<div class="reactions">${reactions}</div>` : ''}
      ${thread}
    </div>
  `;

  // Thread button
  el.querySelector('.thread-btn')?.addEventListener('click', () => openThread(msg.ts));

  // Username / avatar → show user messages
  el.querySelector('.msg-user')?.addEventListener('click', e => {
    e.stopPropagation();
    const uid = e.target.dataset.userId;
    if (uid) showUserMessages(uid, msg.user_name);
  });
  el.querySelector('.avatar')?.addEventListener('click', e => {
    e.stopPropagation();
    const uid = e.target.dataset.userId;
    if (uid) showUserMessages(uid, msg.user_name);
  });

  return el;
}

// ── Load more ──
document.getElementById('load-more').addEventListener('click', async () => {
  if (!currentChannel || !oldestTs) return;
  const btn = document.getElementById('load-more');
  btn.textContent = 'Loading…';
  await fetchMessages(currentChannel, oldestTs);
  btn.textContent = 'Load older messages';
  btn.style.display = hasMore ? 'block' : 'none';
});

// ── Thread ──
async function openThread(ts) {
  const panel = document.getElementById('thread-panel');
  const container = document.getElementById('thread-messages');
  panel.classList.add('open');
  container.innerHTML = '<div style="color:var(--muted);padding:8px">Loading…</div>';

  const res = await fetch(`/api/channels/${currentChannel}/thread/${ts}`);
  const msgs = await res.json();

  container.innerHTML = '';
  msgs.forEach((msg, i) => {
    if (i === 0) {
      // Parent message
      const el = renderMessage(msg, true);
      el.classList.add('thread-parent');
      container.appendChild(el);

      if (msgs.length > 1) {
        const div = document.createElement('div');
        div.className = 'thread-divider';
        div.textContent = `${msgs.length - 1} ${msgs.length - 1 === 1 ? 'reply' : 'replies'}`;
        container.appendChild(div);
      }
    } else {
      container.appendChild(renderMessage(msg, true));
    }
  });
}

function closeThread() {
  document.getElementById('thread-panel').classList.remove('open');
  document.getElementById('thread-messages').innerHTML = '';
}
document.getElementById('thread-close').addEventListener('click', closeThread);

// ── Delegated click handler for mention links in messages ──
document.getElementById('messages').addEventListener('click', handleMentionClick);
document.getElementById('thread-messages').addEventListener('click', handleMentionClick);
document.getElementById('search-results').addEventListener('click', handleMentionClick);

function handleMentionClick(e) {
  const chLink = e.target.closest('.ch-link');
  if (chLink) {
    e.preventDefault();
    const chId = chLink.dataset.chId;
    const ch = allChannels.find(c => c.id === chId);
    if (ch) selectChannel(ch.id, ch.name, ch.type);
    return;
  }

  const userLink = e.target.closest('.user-link');
  if (userLink) {
    e.preventDefault();
    const uid = userLink.dataset.userId;
    const name = userLink.textContent.replace(/^@/, '');
    if (uid) showUserMessages(uid, name);
  }
}

// ── User messages ──
async function showUserMessages(userId, userName) {
  document.getElementById('search-box').value = '';
  document.getElementById('channel-title').textContent = `Messages from ${userName}`;
  document.getElementById('channel-meta').textContent = 'All channels';
  closeThread();

  document.querySelectorAll('.channel-item').forEach(el => el.classList.remove('active'));
  currentChannel = null;

  showView('search');

  const res = await fetch(`/api/search?user_id=${encodeURIComponent(userId)}`);
  const results = await res.json();
  renderSearchResults(results, `Messages from ${userName}`, () => {
    if (currentChannelName) selectChannel(currentChannel, currentChannelName, currentChannelType);
    else showView('empty');
  });
}

// ── Search ──
document.getElementById('search-box').addEventListener('input', e => {
  clearTimeout(searchTimeout);
  const q = e.target.value.trim();

  if (!q) {
    if (currentChannel) selectChannel(currentChannel, currentChannelName, currentChannelType);
    else showView('empty');
    return;
  }

  searchTimeout = setTimeout(() => runSearch(q), 300);
});

async function runSearch(q) {
  showView('search');
  document.getElementById('search-results').innerHTML = '<div style="color:var(--muted);padding:8px">Searching…</div>';

  const res = await fetch(`/api/search?q=${encodeURIComponent(q)}`);
  const results = await res.json();
  renderSearchResults(results, `${results.length} result${results.length !== 1 ? 's' : ''} for "${q}"`, null);
}

function renderSearchResults(results, headerText, onClear) {
  const container = document.getElementById('search-results');

  if (!results.length) {
    container.innerHTML = `<div style="color:var(--muted);padding:8px">${headerText} — no results</div>`;
    return;
  }

  const clearHtml = onClear
    ? `<span class="results-clear" id="results-clear-btn">← back</span>`
    : '';

  container.innerHTML = `<div class="results-header"><span>${headerText}</span>${clearHtml}</div>` +
    results.map(r => {
      const icon = r.channel_type === 'im' ? '@' : '#';
      return `<div class="search-result" data-ch="${r.channel_id}" data-ch-name="${escAttr(r.channel_name)}" data-ch-type="${r.channel_type}" data-ts="${r.ts}">
        <div class="search-result-meta">
          <span class="search-ch" data-ch="${r.channel_id}" data-ch-name="${escAttr(r.channel_name)}" data-ch-type="${r.channel_type}">${icon}${esc(r.channel_name)}</span>
          <span class="search-user" data-user-id="${r.user_id}" data-user-name="${escAttr(r.user_name)}">${esc(r.user_name)}</span>
          <span>${r.ts_display}</span>
        </div>
        <div class="msg-text">${r.text}</div>
      </div>`;
    }).join('');

  if (onClear) {
    document.getElementById('results-clear-btn')?.addEventListener('click', onClear);
  }

  // Channel link in results
  container.querySelectorAll('.search-ch').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      selectChannel(el.dataset.ch, el.dataset.chName, el.dataset.chType);
    });
  });

  // User link in results
  container.querySelectorAll('.search-user').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      showUserMessages(el.dataset.userId, el.dataset.userName);
    });
  });

  // Click result row → go to channel
  container.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => {
      selectChannel(el.dataset.ch, el.dataset.chName, el.dataset.chType);
    });
  });
}

// ── Utils ──
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return String(s || '').replace(/"/g, '&quot;');
}

// ── Init ──
loadChannels();
</script>
</body>
</html>
